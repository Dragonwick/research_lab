name: ot2_color_detector
description: >
  Detects the color of labware cubes in OT-2 deck slots (1-11) using
  two overhead cameras and trained HSV color signatures.
module_name: color_detector_node.node
class_name: ColorDetectorNode
version: "2.0.0"
tags:
  - camera
  - color-detection
  - ot2
  - vision

actions:
  scan_environment:
    description: >
      Zoom into each of the 11 deck slots and return the detected color
      for every slot. Both cameras are used; results are merged.
      This is the main action for reading the deck state.

  train_color:
    description: >
      Train a color signature. Place the cube in Slot 1 first.
      Blocks until sampling completes (~2 s).
    args:
      request:
        type: TrainColorRequest
        required: true

  record_floor_baseline:
    description: >
      Sample all slot positions with an empty deck and save as the
      floor baseline. Call once before scanning for best accuracy.

  capture_snapshot:
    description: Save the current camera frame to disk.
    args:
      filename:
        type: str
        default: snapshot.jpg

  set_slot_position:
    description: Update the camera pixel coordinates for one slot.
    args:
      request:
        type: SetSlotPositionRequest
        required: true
