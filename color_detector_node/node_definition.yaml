name: ot2_color_detector
description: >
  Detects the color of labware cubes placed in OT-2 deck slots (1-11)
  using an overhead camera and trained HSV color signatures.
module_name: color_detector_node.node
class_name: ColorDetectorNode
version: "1.0.0"
tags:
  - camera
  - color-detection
  - ot2
  - vision

actions:
  scan_all_slots:
    description: Scan all 11 deck slots and return confirmed colors.
    args:
      frames_per_slot:
        type: int
        default: 20
        description: Frames of data to accumulate before returning results.

  get_slot_color:
    description: Get the confirmed color for a single slot.
    args:
      slot:
        type: int
        required: true
        description: Slot number 1-11.

  get_all_colors:
    description: Return live confirmed colors for all 11 slots immediately.

  train_color:
    description: >
      Train a color signature. Place the cube in Slot 1 first.
      Blocks until sampling completes (~2 s).
    args:
      request:
        type: TrainColorRequest
        required: true

  record_floor_baseline:
    description: >
      Sample all slot positions with an empty deck.
      Must be called before reliable color detection is possible.

  set_slot_position:
    description: Update the camera pixel coordinates for one slot.
    args:
      request:
        type: SetSlotPositionRequest
        required: true

  capture_snapshot:
    description: Save the current camera frame to disk.
    args:
      filename:
        type: str
        default: snapshot.jpg
